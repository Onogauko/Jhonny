<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expired Control D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --violet: #6d28d9; --violet-light: #ede9fe; --violet-mid: #8b5cf6;
  --red: #dc2626; --red-light: #fee2e2; --amber: #d97706; --amber-light: #fef3c7;
  --green: #059669; --green-light: #d1fae5; --surface: #ffffff;
  --bg: #f5f3ff; --border: #e8e3f7; --text: #1c1033; --text-2: #6b7280;
  --text-3: #a78bfa; --radius: 16px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; }

/* HEADER */
.header { background: var(--violet); padding: 50px 20px 0; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.header-title { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.header-date { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
.sync-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 10px; padding: 8px 12px; font-size: 12px; cursor: pointer; }

/* TABS */
.tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0; padding: 5px 5px 0; margin-top: 4px; }
.tab-btn { flex: 1; background: transparent; border: none; color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500; padding: 10px 0 12px; border-radius: 9px 9px 0 0; cursor: pointer; }
.tab-btn.active { background: var(--bg); color: var(--violet); }

/* CONTENT */
.main { flex: 1; overflow-y: auto; padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* CARD & INPUT */
.scan-area { background: var(--surface); border-radius: var(--radius); border: 1.5px dashed var(--border); padding: 20px; text-align: center; margin-bottom: 14px; cursor: pointer; }
.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
.inp { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 13px; margin-bottom: 8px; outline: none; }
.btn-primary { background: var(--violet); color: white; border: none; border-radius: 10px; padding: 11px; width: 100%; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* LIST ITEM */
.recent-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
.ri-info { flex: 1; min-width: 0; }
.ri-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.ri-actions { display: flex; gap: 6px; }
.icon-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* TARIK PANEL */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 5px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 600; }
.pull-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--red); padding: 12px; margin-bottom: 8px; }
.pull-card.amber { border-left-color: var(--amber); }
.pull-card.green { border-left-color: var(--green); }
.pull-card.done { opacity: 0.4; }
.check-box { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.check-box.checked { background: var(--green); border-color: var(--green); }

/* SCANNER & MODAL */
.scanner-overlay { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
.scanner-overlay.open { display: flex; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-card { background: white; width: 100%; max-width: 430px; border-radius: 20px 20px 0 0; padding: 20px 20px 40px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; z-index: 1000; transition: 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scannerOverlay">
  <div style="padding: 50px 20px 15px; display: flex; justify-content: space-between; color: white;">
    <span style="font-weight:600">Scan Barcode</span>
    <button onclick="closeScanner()" style="background:none; border:1px solid white; color:white; padding:5px 15px; border-radius:8px;">Tutup</button>
  </div>
  <div id="html5-qrcode-container"></div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal-card">
    <div style="font-weight:600; margin-bottom:15px;">Edit Data Barang</div>
    <input type="hidden" id="editRowIndex">
    <input class="inp" id="editBarcode" placeholder="Barcode">
    <input class="inp" id="editDesc" placeholder="Nama Barang">
    <input class="inp" id="editExp" type="date">
    <input class="inp" id="editLokasi" placeholder="Lokasi">
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="inp" style="background:#eee; margin:0;" onclick="closeEditModal()">Batal</button>
      <button class="btn-primary" onclick="saveEdit()" id="btnSaveEdit">Simpan Perubahan</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Expired Control D&D</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="sync-btn" onclick="loadAll()" id="syncBtn">Sync</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabInput" onclick="switchTab('input')">Input</button>
    <button class="tab-btn" id="tabTarik" onclick="switchTab('tarik')">Tarik</button>
  </div>
</div>

<div class="main">
  <!-- TAB INPUT -->
  <div class="panel active" id="panelInput">
    <div class="scan-area" onclick="openScanner()">
      <div style="font-size:24px; margin-bottom:5px;">📷</div>
      <div style="font-weight:600; font-size:14px;">Klik untuk Scan Barcode</div>
    </div>

    <div class="form-card">
      <input class="inp" id="fBarcode" placeholder="Barcode" oninput="autoFill(this.value)">
      <input class="inp" id="fDesc" placeholder="Nama Barang">
      <input class="inp" id="fExp" type="date">
      <input class="inp" id="fLokasi" placeholder="Lokasi (Rak/Area)">
      <button class="btn-primary" onclick="submitInput()" id="submitBtn">Simpan Ke Spreadsheet</button>
    </div>

    <div style="font-size:11px; font-weight:700; color:var(--text-3); margin-bottom:10px;">INPUT HARI INI</div>
    <div id="recentList"></div>
  </div>

  <!-- TAB TARIK -->
  <div class="panel" id="panelTarik">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" style="color:var(--red)" id="sHarus">0</div><div class="stat-lbl">Harus</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)" id="sMendekati">0</div><div class="stat-lbl">Nanti</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="sAman">0</div><div class="stat-lbl">Aman</div></div>
    </div>
    <div id="pullList"></div>
  </div>
</div>

<script>
// =============================================
// KONFIGURASI
// =============================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAUZU8sXxjAfd8_pWPR0fybYWp2yxIBgvIR57ml25i5bDDDDHvk2ENIfsAw0lgrWMv/exec"; 
const API_TOKEN       = "RAHASIA_123";

let dbItems = JSON.parse(localStorage.getItem('cache_db') || "[]");
let inItems = JSON.parse(localStorage.getItem('cache_in') || "[]");
let checkedRows = new Set(JSON.parse(localStorage.getItem('cache_checked') || "[]"));
let todayStr = new Date().toISOString().split('T')[0];
let html5QrScanner = null;

window.onload = () => {
  document.getElementById('headerDate').innerText = formatDateIndo(todayStr);
  document.getElementById('fExp').value = todayStr;
  renderRecent();
  renderPullList();
  loadAll();
};

// =============================================
// FORMAT TANGGAL INDONESIA
// =============================================
function formatDateIndo(iso) {
  if (!iso) return "-";
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
  return `${parts[2]} ${months[parseInt(parts[1]) - 1]} ${parts[0]}`;
}

// =============================================
// API SYSTEM
// =============================================
async function callApi(params, body = null) {
  params.token = API_TOKEN;
  const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params);
  const options = {
    method: body ? 'POST' : 'GET',
    body: body ? JSON.stringify({ ...body, token: API_TOKEN }) : null
  };
  const res = await fetch(url, options);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadAll() {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.innerText = "Sync...";
  try {
    const [dbRes, inRes] = await Promise.all([callApi({action:"getDatabase"}), callApi({action:"getInputs"})]);
    dbItems = dbRes.data; inItems = inRes.data;
    localStorage.setItem('cache_db', JSON.stringify(dbItems));
    localStorage.setItem('cache_in', JSON.stringify(inItems));
    renderRecent(); renderPullList();
    showToast("Data Diperbarui", "success");
  } catch(e) { showToast("Gagal Sync", "error"); }
  syncBtn.innerText = "Sync";
}

async function submitInput() {
  const b = document.getElementById('fBarcode').value.trim();
  const d = document.getElementById('fDesc').value.trim();
  const e = document.getElementById('fExp').value;
  const l = document.getElementById('fLokasi').value.trim();
  if(!b || !e) return showToast("Barcode & Tgl wajib!", "error");

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerText = "Menyimpan...";
  try {
    const res = await callApi({action:"addInput"}, {barcode:b, description:d, expiredDate:e, lokasi:l});
    inItems.push({rowIndex:res.rowIndex, barcode:b, description:d, expiredDate:e, lokasi:l, timestamp:todayStr});
    localStorage.setItem('cache_in', JSON.stringify(inItems));
    renderRecent(); renderPullList();
    document.getElementById('fBarcode').value = ""; document.getElementById('fDesc').value = "";
    showToast("Berhasil Disimpan", "success");
  } catch(x) { showToast("Gagal Simpan", "error"); }
  btn.disabled = false; btn.innerText = "Simpan Ke Spreadsheet";
}

// =============================================
// EDIT & DELETE
// =============================================
function openEdit(idx) {
  const item = inItems.find(i => i.rowIndex == idx);
  if(!item) return;
  document.getElementById('editRowIndex').value = idx;
  document.getElementById('editBarcode').value = item.barcode;
  document.getElementById('editDesc').value = item.description;
  document.getElementById('editExp').value = item.expiredDate;
  document.getElementById('editLokasi').value = item.lokasi;
  document.getElementById('modalEdit').classList.add('open');
}

function closeEditModal() { document.getElementById('modalEdit').classList.remove('open'); }

async function saveEdit() {
  const idx = document.getElementById('editRowIndex').value;
  const b = document.getElementById('editBarcode').value;
  const d = document.getElementById('editDesc').value;
  const e = document.getElementById('editExp').value;
  const l = document.getElementById('editLokasi').value;
  const btn = document.getElementById('btnSaveEdit');
  btn.disabled = true; btn.innerText = "Sync...";
  try {
    await callApi({action:"updateInput"}, {rowIndex:idx, barcode:b, description:d, expiredDate:e, lokasi:l});
    const i = inItems.findIndex(x => x.rowIndex == idx);
    inItems[i] = {...inItems[i], barcode:b, description:d, expiredDate:e, lokasi:l};
    localStorage.setItem('cache_in', JSON.stringify(inItems));
    renderRecent(); renderPullList(); closeEditModal();
    showToast("Berhasil Update", "success");
  } catch(x) { showToast("Gagal Update", "error"); }
  btn.disabled = false; btn.innerText = "Simpan Perubahan";
}

async function delItem(idx) {
  if(!confirm("Hapus data ini?")) return;
  try {
    await callApi({action:"deleteInput"}, {rowIndex:idx});
    inItems = inItems.filter(x => x.rowIndex != idx);
    localStorage.setItem('cache_in', JSON.stringify(inItems));
    renderRecent(); renderPullList();
    showToast("Data Dihapus", "success");
  } catch(x) { showToast("Gagal Hapus", "error"); }
}

// =============================================
// RENDER TAMPILAN
// =============================================
function renderRecent() {
  const container = document.getElementById('recentList');
  const filtered = inItems.filter(i => i.timestamp && i.timestamp.startsWith(todayStr)).reverse();
  if(!filtered.length) { container.innerHTML = `<div style="text-align:center;padding:20px;color:#999;font-size:12px;">Belum ada input hari ini</div>`; return; }

  container.innerHTML = filtered.map(i => `
    <div class="recent-item">
      <div class="ri-info">
        <div class="ri-name">${i.description || i.barcode}</div>
        <div class="ri-meta">${i.barcode} · Exp: ${formatDateIndo(i.expiredDate)}</div>
      </div>
      <div class="ri-actions">
        <button class="icon-btn" style="background:#ede9fe" onclick="openEdit(${i.rowIndex})">✏️</button>
        <button class="icon-btn" style="background:#fee2e2" onclick="delItem(${i.rowIndex})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function renderPullList() {
  const container = document.getElementById('pullList');
  let h=0, m=0, a=0;
  const list = inItems.map(i => {
    const db = dbItems.find(x => x.barcode === i.barcode);
    const hMin = db ? db.hMinus : 0;
    const diff = Math.round((new Date(i.expiredDate) - new Date(todayStr)) / 86400000);
    const pullDays = diff - hMin;
    let status = 'green';
    if(pullDays <= 0) { status = 'red'; h++; } else if(pullDays <= 3) { status = 'amber'; m++; } else a++;
    return { ...i, status, pullDays };
  }).sort((a,b) => a.pullDays - b.pullDays);

  document.getElementById('sHarus').innerText = h;
  document.getElementById('sMendekati').innerText = m;
  document.getElementById('sAman').innerText = a;

  container.innerHTML = list.map(i => `
    <div class="pull-card ${i.status === 'red' ? '' : i.status === 'amber' ? 'amber' : 'green'} ${checkedRows.has(i.rowIndex)?'done':''}">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div>
          <div class="ri-name">${i.description || i.barcode}</div>
          <div class="ri-meta">Exp: ${formatDateIndo(i.expiredDate)}</div>
          <div style="font-size:10px; font-weight:700; margin-top:4px; color:#666">${i.status.toUpperCase()}</div>
        </div>
        <div class="check-box ${checkedRows.has(i.rowIndex)?'checked':''}" onclick="toggleCheck(${i.rowIndex})">
          ${checkedRows.has(i.rowIndex)?'✔️':''}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCheck(idx) {
  if(checkedRows.has(idx)) checkedRows.delete(idx); else checkedRows.add(idx);
  localStorage.setItem('cache_checked', JSON.stringify([...checkedRows]));
  renderPullList();
}

// =============================================
// SCANNER & UTILS
// =============================================
function openScanner() {
  document.getElementById('scannerOverlay').classList.add('open');
  html5QrScanner = new Html5Qrcode("html5-qrcode-container");
  html5QrScanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
    if(navigator.vibrate) navigator.vibrate(50);
    // Beep Sound
    try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); const g = ctx.createGain(); osc.connect(g); g.connect(ctx.destination); osc.frequency.value = 880; g.gain.value = 0.1; osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e){}
    closeScanner();
    document.getElementById('fBarcode').value = text;
    autoFill(text);
  });
}
function closeScanner() {
  document.getElementById('scannerOverlay').classList.remove('open');
  if(html5QrScanner) { html5QrScanner.stop(); html5QrScanner = null; }
}
function autoFill(val) {
  const found = dbItems.find(x => x.barcode === val);
  if(found) document.getElementById('fDesc').value = found.description;
}
function switchTab(t) {
  document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
  document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
}
function showToast(m, type) {
  const t = document.getElementById('toast'); t.innerText = m; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
</body>
</html>
