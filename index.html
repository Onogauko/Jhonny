<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expired Control D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --violet: #6d28d9; --violet-light: #ede9fe; --violet-mid: #8b5cf6;
  --red: #dc2626; --red-light: #fee2e2;
  --amber: #d97706; --amber-light: #fef3c7;
  --green: #059669; --green-light: #d1fae5;
  --surface: #ffffff; --bg: #f5f3ff;
  --border: #e8e3f7; --text: #1c1033;
  --text-2: #6b7280; --text-3: #a78bfa;
  --radius: 16px; --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; }

/* HEADER */
.header { background: var(--violet); padding: 50px 20px 0; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.header-title { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.header-date { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
.sync-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
.sync-btn:active { background: rgba(255,255,255,0.25); }

/* TABS */
.tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0; padding: 5px 5px 0; margin-top: 10px; }
.tab-btn { flex: 1; background: transparent; border: none; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; padding: 10px 0 12px; border-radius: 9px 9px 0 0; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.tab-btn.active { background: var(--bg); color: var(--violet); font-weight: 700; }

/* CONTENT */
.main { flex: 1; overflow-y: auto; padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* CARD & INPUT */
.scan-area { background: var(--violet); border-radius: var(--radius); padding: 20px; text-align: center; margin-bottom: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(109,40,217,0.3); }
.scan-area:active { transform: scale(0.98); }
.scan-area-icon { font-size: 28px; margin-bottom: 6px; }
.scan-area-text { font-weight: 700; font-size: 14px; color: #fff; }
.scan-area-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
.inp { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 13px; margin-bottom: 8px; outline: none; font-family: 'DM Sans', sans-serif; color: var(--text); transition: border-color 0.2s; }
.inp:focus { border-color: var(--violet-mid); background: #faf8ff; }
.inp:last-of-type { margin-bottom: 0; }
.btn-primary { background: var(--violet); color: white; border: none; border-radius: 10px; padding: 13px; width: 100%; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'DM Sans', sans-serif; margin-top: 10px; transition: opacity 0.2s, transform 0.15s; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.55; }

/* LIST ITEM */
.section-label { font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 10px; letter-spacing: 0.05em; }
.recent-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.ri-info { flex: 1; min-width: 0; }
.ri-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.ri-actions { display: flex; gap: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: transform 0.15s; }
.icon-btn:active { transform: scale(0.9); }

/* TARIK PANEL (Updated) */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 5px; text-align: center; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; }
.stat-card:active { transform: scale(0.97); }
.stat-card.active-filter { box-shadow: 0 0 0 2px var(--violet); }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }

/* FILTER TABS (in tarik) */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-2); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.filter-chip.active { background: var(--violet); border-color: var(--violet); color: white; }

/* PULL CARD */
.pull-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--red); padding: 12px 13px; margin-bottom: 8px; transition: opacity 0.3s; }
.pull-card.amber { border-left-color: var(--amber); }
.pull-card.green { border-left-color: var(--green); }
.pull-card.done { opacity: 0.38; }
.pull-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.pull-name { font-size: 13px; font-weight: 600; }
.pull-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; }
.pull-status-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-top: 5px; display: inline-block; }
.pull-status-badge.red { background: var(--red-light); color: var(--red); }
.pull-status-badge.amber { background: var(--amber-light); color: var(--amber); }
.pull-status-badge.green { background: var(--green-light); color: var(--green); }
.check-box { min-width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-2); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* SCANNER OVERLAY */
.scanner-overlay { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
.scanner-overlay.open { display: flex; }
.scanner-header { padding: 54px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
.scanner-title { color: white; font-weight: 700; font-size: 16px; }
.scanner-close { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.scanner-hint { color: rgba(255,255,255,0.5); font-size: 12px; text-align: center; padding: 0 20px 10px; }
#html5-qrcode-container { flex: 1; }

.scanner-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; pointer-events: none; z-index: 210; }
.scanner-frame::before, .scanner-frame::after { content: ''; position: absolute; width: 36px; height: 36px; border-color: #fff; border-style: solid; }
.scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scanner-frame::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scanner-frame-tr, .scanner-frame-bl { position: absolute; width: 36px; height: 36px; border-color: #fff; border-style: solid; }
.scanner-frame-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scanner-frame-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
@keyframes scanLine { 0% { top: 10%; } 100% { top: 90%; } }
.scan-line { position: absolute; left: 5%; right: 5%; height: 2px; background: linear-gradient(90deg, transparent, #6d28d9, #a78bfa, #6d28d9, transparent); border-radius: 2px; animation: scanLine 1.8s ease-in-out infinite alternate; z-index: 211; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-card { background: white; width: 100%; max-width: 430px; border-radius: 20px 20px 0 0; padding: 20px 20px 40px; }
.modal-title { font-weight: 700; font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 12px; }
.btn-cancel { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text); }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1c1033; color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 1000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #065f46; }
.toast.error { background: #7f1d1d; }

.lokasi-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.lokasi-chip { background: var(--violet-light); color: var(--violet); border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  color:#111;
  font-weight:600;
  cursor:pointer;
}

.admin-tab.active{
  background:#111827;
  color:white;
}
</style>
</head>

<script>
const PROXY_URL = "/api/proxy"; 
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAUZU8sXxjAfd8_pWPR0fybYWp2yxIBgvIR57ml25i5bDDDDHvk2ENIfsAw0lgrWMv/exec";
const API_TOKEN = "RAHASIA_123"; 

const CACHE_TTL_MS = 6 * 60 * 60 * 1000;
let dbItems = [];
let inItems = [];
let checkedRows = new Set();
let selectedPullDate = getTodayStr();
let html5QrScanner = null;
let lokasiFrecuentes = [];
let isAdmin = false;
const ADMIN_PASSWORD = "admin123";

function getTodayStr() {

  const now = new Date();

  const jakarta = new Date(
    now.toLocaleString("en-US", {
      timeZone: "Asia/Jakarta"
    })
  );

  const year = jakarta.getFullYear();

  const month = String(
    jakarta.getMonth() + 1
  ).padStart(2, '0');

  const day = String(
    jakarta.getDate()
  ).padStart(2, '0');

  return `${year}-${month}-${day}`;
}

function getExpRaw(obj) {
  if (!obj) return null;
  const exact = ['Expired Date', 'expiredDate', 'expired_date', 'expDate', 'exp_date', 'tanggal_expired', 'Tanggal Expired'];
  for (let k of exact) if (obj[k]) return obj[k];
  let possibleDate = null;
  for (let key in obj) {
    let k = String(key).toLowerCase().replace(/[^a-z0-9]/g, '');
    if (k.includes('exp') || k.includes('kadal')) if (obj[key]) return obj[key];
    if (!possibleDate && (k.includes('date') || k.includes('tgl') || k.includes('tanggal')) && !k.includes('timestamp') && !k.includes('input')) if (obj[key]) possibleDate = obj[key];
  }
  if (possibleDate) return possibleDate;
  let fallbackDates = [];
  for (let key in obj) {
    let val = String(obj[key]).trim();
    if (val.length < 5 || val.length > 30) continue;
    if (/^\d+$/.test(val) && val.length > 10) continue;
    if (/^\d{4}[\/\-]\d{2}[\/\-]\d{2}/.test(val) || /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/.test(val) || (/^\d{5}$/.test(val) && parseInt(val) > 30000)) fallbackDates.push(val);
  }
  return fallbackDates.length > 0 ? (fallbackDates.find(v => !v.includes(':')) || fallbackDates[0]) : null;
}

function parseToISO(raw) {
  if (!raw) return null;
  if (raw instanceof Date) return raw.toISOString().split('T')[0];
  let s = String(raw).trim();
  if (/^\d{5}$/.test(s) && parseInt(s) > 30000) {
    let d = new Date((parseInt(s) - 25569) * 86400000);
    return d.toISOString().split('T')[0];
  }
  let iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) return `${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  let us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (us) {
    let a = parseInt(us[1]), b = parseInt(us[2]);
    if (a > 12) return `${us[3]}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`;
    return `${us[3]}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`;
  }
  let d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
  return null;
}

function daysDiff(rawA, rawB) {
  const isoA = parseToISO(rawA), isoB = parseToISO(rawB);
  if (!isoA || !isoB) return 0;
  const [y1,m1,d1] = isoA.split('-').map(Number), [y2,m2,d2] = isoB.split('-').map(Number);
  return Math.round((new Date(y1,m1-1,d1) - new Date(y2,m2-1,d2)) / 86400000);
}

function loadCache() {
  try {
    const dbRaw = localStorage.getItem('cache_db'), inRaw = localStorage.getItem('cache_in'), chkRaw = localStorage.getItem('cache_checked');
    const now = Date.now();
    dbItems = (dbRaw && (now - parseInt(localStorage.getItem('cache_db_ts') || '0')) < CACHE_TTL_MS) ? JSON.parse(dbRaw) : [];
    inItems = (inRaw && (now - parseInt(localStorage.getItem('cache_in_ts') || '0')) < CACHE_TTL_MS) ? JSON.parse(inRaw) : [];
    checkedRows = new Set(chkRaw ? JSON.parse(chkRaw) : []);
  } catch(e) { dbItems = []; inItems = []; checkedRows = new Set(); }
}

function saveCache(key, data) { localStorage.setItem(key, JSON.stringify(data)); localStorage.setItem(key + '_ts', Date.now().toString()); }

async function callApi(params, body = null) {
  try {
    const res = await fetch(PROXY_URL + "?" + new URLSearchParams(params), { method: body ? 'POST' : 'GET', headers: {'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : null });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return json;
  } catch(e) {
    params.token = API_TOKEN;
    const res = await fetch(APPS_SCRIPT_URL + "?" + new URLSearchParams(params), { method: body ? 'POST' : 'GET', body: body ? JSON.stringify({...body, token:API_TOKEN}) : null });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return json;
  }
}

async function submitInput() {
  const b = document.getElementById('fBarcode').value.trim();
  const d = document.getElementById('fDesc').value.trim();
  const e = document.getElementById('fExp').value;
  const l = document.getElementById('fLokasi').value.trim();

  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = "Menyimpan...";

  try {
    const res = await callApi(
      { action:"addInput" },
      {
        barcode: b,
        description: d,
        expiredDate: e,
        lokasi: l

      rowIndex: res.rowIndex,

function closeEditModal() { document.getElementById('modalEdit').classList.remove('open'); }

async function saveEdit() {
  const idx = document.getElementById('editRowIndex').value;
  const data = { rowIndex:idx, barcode:document.getElementById('editBarcode').value.trim(), description:document.getElementById('editDesc').value.trim(), expiredDate:document.getElementById('editExp').value, lokasi:document.getElementById('editLokasi').value.trim() };
  try {
    await callApi({action:"updateInput"}, data);
    const i = inItems.findIndex(x => x.rowIndex == idx);
    inItems[i] = {...inItems[i], ...data};

async function delItem(idx) {
  if (!confirm("Hapus data ini?")) return;
  try {
    await callApi({action:"deleteInput"}, {rowIndex:idx});
    inItems = inItems.filter(x => x.rowIndex != idx);
    saveCache('cache_in', inItems); renderRecent(); renderPullList();
    if(isAdmin) loadAdminInputs();

function formatDateIndo(raw) {
  const iso = parseToISO(raw);
  if (!iso) return '-';
  const [y,m,d] = iso.split('-').map(Number);
  return `${d} ${["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][m-1]} ${y}`;
}

function renderRecent() {
  const container = document.getElementById('recentList');
  const today = getTodayStr();
  const filtered = inItems.filter(i => (i.timestamp || "").startsWith(today)).reverse();
  if (!filtered.length) { container.innerHTML = `<div class="empty-state">Belum ada input hari ini</div>`; return; }
  container.innerHTML = filtered.map(i => `
    <div class="recent-item">
      <div class="ri-info">
        <div class="ri-name">${escHtml(i.description || i.barcode)}</div>
        <div class="ri-meta">${escHtml(i.barcode)} · Exp: ${formatDateIndo(getExpRaw(i))}</div>
      </div>
      ${isAdmin ? `
      <div class="ri-actions">
        <button class="icon-btn" onclick="openEdit(${i.rowIndex})">✏️</button>
        <button class="icon-btn" onclick="delItem(${i.rowIndex})">🗑️</button>
      </div>
      ` : ``}
    </div>`).join('');
}

function setFilter(filter) {
  // Function maintained to prevent referencing errors, although the buttons were removed
  selectedPullDate = getTodayStr();
  renderPullList();
}

function renderPullList() {
  const container = document.getElementById('pullList');
  const today = getTodayStr();
  let h = 0, m = 0, a = 0;
  
  const list = inItems.map(i => {
    const db = dbItems.find(x => x.barcode === i.barcode), hMin = db ? (db.hMinus || 0) : 0;
    
    const rawExp =
      getExpRaw(i) ||
      i.expiredDate ||
      i['Expired Date'] ||
      i['expired_date'] ||
      i['exp_date'] ||
      i['Tanggal Expired'] ||
      i['tanggal_expired'];

    console.log('RAW EXP:', rawExp, i);

    const isoExp = parseToISO(rawExp); 

    if (!isoExp) { 
      a++; 
      return {...i, status:'green', daysUntilPull:9999, daysUntilExp:9999, isTodayPull: false}; 
    }
    
    const daysUntilExp = daysDiff(isoExp, today) + 1;
    const daysUntilPull = daysUntilExp - (hMin - 1);
    let status = (daysUntilPull <= 0) ? 'red' : (daysUntilPull <= 3) ? 'amber' : 'green';
    if (status === 'red') h++; else if (status === 'amber') m++; else a++;

    const pullDate = new Date(isoExp);
    pullDate.setDate(pullDate.getDate() - (hMin - 1));

    const filterDate = selectedPullDate || getTodayStr();
    const todayDate = new Date(filterDate);

    const isTodayPull =
      pullDate.getFullYear() === todayDate.getFullYear() &&
      pullDate.getMonth() === todayDate.getMonth() &&
      pullDate.getDate() === todayDate.getDate();

    return {
      ...i,
      isoExp,
      status,
      daysUntilExp,
      isTodayPull
    };
  }).sort((a, b) => a.daysUntilExp - b.daysUntilExp);
  
  const filtered = list.filter(i => i.isTodayPull);

  // UPDATE TOTAL JUMLAH (UPDATED)
  document.getElementById('pullTotalInfo').innerText =
    `Total: ${filtered.length}`;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        Tidak ada barang yg wajib ditarik di tanggal ini
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map(i => `
    <div class="pull-card ${i.status} ${checkedRows.has(i.rowIndex) ? 'done' : ''}">
      <div class="pull-card-top">
        <div style="flex:1">
          <div class="pull-name">${escHtml(i.description || i.barcode)}</div>
          <div class="pull-meta">Exp: ${formatDateIndo(i.isoExp)} (${i.daysUntilExp} hari menuju expired)</div>
        </div>
        <div class="check-box ${checkedRows.has(i.rowIndex) ? 'checked' : ''}" onclick="toggleCheck(${i.rowIndex})">${checkedRows.has(i.rowIndex) ? '✔️' : ''}</div>
      </div>
    </div>`).join('');
}

function toggleCheck(idx) {
  if (checkedRows.has(idx)) checkedRows.delete(idx); else checkedRows.add(idx);
  localStorage.setItem('cache_checked', JSON.stringify([...checkedRows]));
  renderPullList();
}

function buildLokasiHistory() {
  const freq = {}; inItems.forEach(i => { if (i.lokasi) freq[i.lokasi] = (freq[i.lokasi] || 0) + 1; });
  lokasiFrecuentes = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,5).map(e => e[0]);
  renderLokasiChips('');
}

function renderLokasiChips(val) {
  const container = document.getElementById('lokasiChips');
  const s = lokasiFrecuentes.filter(l => !val || l.toLowerCase().includes(val.toLowerCase()));
  container.innerHTML = s.map(l => `<button class="lokasi-chip" onclick="pickLokasi('${l.replace(/'/g, "\\'")}')">${escHtml(l)}</button>`).join('');
}

function updateLokasiChips() { renderLokasiChips(document.getElementById('fLokasi').value); }

async function loadAdminInputs() {
  try {
    const json = await callApi({ action: "getInputs" });

    showToast("Error load data: " + e.message, "error");

function renderAdminInputs(data) {
  const q =
    (
      document.getElementById('inputSearch')?.value || ''
    )
    .toLowerCase()
    .trim();

  if (q) {

    data = data.filter(item =>

      (item.barcode || '')
        .toLowerCase()
        .includes(q)

      ||

      (item.description || '')
        .toLowerCase()
        .includes(q)

    );

  } else {

    data = data.slice(0, 30);

  }

  const container = document.getElementById("adminInputsList");

  if (!data.length) {
    container.innerHTML = `
      <div class="empty-state">
        Tidak ada data
      </div>
    `;
    return;
  }

  container.innerHTML = data.map(item => `
    <div class="form-card" style="margin-bottom:8px;">
      <div style="font-weight:bold;margin-bottom:4px;">
        ${escHtml(item.description)}
      </div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:2px;">

      </div>
      <div style="font-size:12px;color:var(--text-2);margin-bottom:2px;">
        Expired: ${escHtml(item.expiredDate)}

        Lokasi: ${escHtml(item.lokasi)}
      </div>

async function editInputData(item) {

  const expiredDate = prompt(
    "Expired Date (YYYY-MM-DD)",
    item.expiredDate
  );

  if (expiredDate === null) return;

  const lokasi = prompt(
    "Lokasi",
    item.lokasi
  );

  if (lokasi === null) return;

  fetch(APPS_SCRIPT_URL, {

    method: "POST",

    body: JSON.stringify({

      action: "updateInput",

      token: API_TOKEN,

      rowIndex: item.rowIndex,

      barcode: item.barcode,

      description: item.description,

      expiredDate: expiredDate,

      lokasi: lokasi

    })

  })
  .then(r => r.json())
  .then(() => {

    loadAdminInputs();

  });

}

function renderAdminDatabase() {

  const q =
    (
      document.getElementById('dbSearch')?.value || ''
    )
    .toLowerCase()
    .trim();

  let data = [...dbItems];

  // =========================================
  // SEARCH
  // =========================================

  if (q) {

    data = data.filter(i =>

      (i.barcode || '')
        .toLowerCase()
        .includes(q)

      ||

      (i.description || '')
        .toLowerCase()
        .includes(q)

    );

  } else {

    // =========================================
    // DEFAULT LOAD 30 DATA SAJA
    // =========================================

    data = data.slice(0, 30);

  }

  // =========================================
  // EMPTY
  // =========================================

  if (!data.length) {

    document.getElementById('adminDatabaseList').innerHTML = `
      <div class="empty-state">
        Tidak ada data ditemukan
      </div>
    `;

    return;

  }

  // =========================================
  // RENDER
  // =========================================

  document.getElementById('adminDatabaseList').innerHTML =
    data.map(i => `

      <div class="recent-item">

        <div class="ri-info">

          <div class="ri-name">
            ${escHtml(i.description)}
          </div>

          <div class="ri-meta">
            ${escHtml(i.barcode)}

            class="icon-btn"

function editDatabase(barcode) {
  const item = dbItems.find(i => i.barcode == barcode);

  if (!item) {
    return showToast("Data tidak ditemukan", "error");
  }

  document.getElementById('dbOldBarcode').value = item.barcode;

  document.getElementById('dbBarcode').value =
    item.barcode || '';

  document.getElementById('dbDescription').value =
    item.description || '';

  document.getElementById('dbTarik').value =
    item.hMinus || item['Ketentuan Tarik'] || '';

  document.getElementById('modalDatabaseEdit')
    .classList.add('open');
}

function openDatabaseEdit(item) {
  document.getElementById('dbOldBarcode').value = item.barcode;
  document.getElementById('dbBarcode').value = item.barcode || '';
  document.getElementById('dbDescription').value = item.description || '';
  document.getElementById('dbTarik').value = item.hMinus || item['Ketentuan Tarik'] || '';
  document.getElementById('modalDatabaseEdit').classList.add('open');
}

function closeDatabaseEdit() {
  document.getElementById('modalDatabaseEdit')
    .classList.remove('open');
}

async function saveDatabaseEdit() {
  const oldBarcode =
    document.getElementById('dbOldBarcode').value;

  const data = {
    barcode:
      document.getElementById('dbBarcode').value.trim(),

    description:
      document.getElementById('dbDescription').value.trim(),

    hMinus:
      document.getElementById('dbTarik').value.trim()
  };

  if (!data.barcode || !data.description || !data.hMinus) {
    return showToast("Semua field wajib diisi", "error");
  }

  try {

    await callApi(
      { action:"updateDatabase" },
      {
        oldBarcode,
        ...data
      }
    );

    const idx = dbItems.findIndex(i => i.barcode == oldBarcode);

    if (idx !== -1) {
      dbItems[idx] = {
        ...dbItems[idx],
        ...data
      };
    }

    saveCache('cache_db', dbItems);

    renderAdminDatabase();
    renderPullList();

    closeDatabaseEdit();

    showToast("Database berhasil diupdate", "success");

  } catch(err) {

    showToast(
      "Gagal update database: " + err.message,
      "error"
    );

  }
}

async function deleteDatabase(barcode) {
  if (!confirm("Hapus data database ini?")) return;

  try {

    await callApi(
      { action:"deleteDatabase" },
      { barcode }
    );

    dbItems = dbItems.filter(i => i.barcode != barcode);

    saveCache('cache_db', dbItems);

    renderAdminDatabase();
    renderPullList();

    showToast("Database berhasil dihapus", "success");

  } catch(err) {

    showToast(
      "Gagal hapus database: " + err.message,
      "error"
    );

  }
}

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.onload = () => {
  document.getElementById('headerDate').innerText = formatDateIndo(getTodayStr());

  document.getElementById('pullDateFilter').value = getTodayStr();
  selectedPullDate = getTodayStr();

  // tanggal dikosongkan, user wajib pilih sendiri
  document.getElementById('fExp').value = "";

  loadCache();
  renderRecent();
  renderPullList();
  buildLokasiHistory();
  loadAll();
};
