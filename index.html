<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expired Control D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --violet: #6d28d9; --violet-light: #ede9fe; --violet-mid: #8b5cf6;
  --red: #dc2626; --red-light: #fee2e2;
  --amber: #d97706; --amber-light: #fef3c7;
  --green: #059669; --green-light: #d1fae5;
  --surface: #ffffff; --bg: #f5f3ff;
  --border: #e8e3f7; --text: #1c1033;
  --text-2: #6b7280; --text-3: #a78bfa;
  --radius: 16px; --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; }

/* HEADER */
.header { background: var(--violet); padding: 50px 20px 0; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.header-title { color: #fff; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.header-date { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
.sync-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
.sync-btn:active { background: rgba(255,255,255,0.25); }

/* TABS */
.tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0; padding: 5px 5px 0; margin-top: 4px; }
.tab-btn { flex: 1; background: transparent; border: none; color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 500; padding: 10px 0 12px; border-radius: 9px 9px 0 0; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.tab-btn.active { background: var(--bg); color: var(--violet); font-weight: 700; }

/* CONTENT */
.main { flex: 1; overflow-y: auto; padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* CARD & INPUT */
.scan-area { background: var(--violet); border-radius: var(--radius); padding: 20px; text-align: center; margin-bottom: 14px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(109,40,217,0.3); }
.scan-area:active { transform: scale(0.98); }
.scan-area-icon { font-size: 28px; margin-bottom: 6px; }
.scan-area-text { font-weight: 700; font-size: 14px; color: #fff; }
.scan-area-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
.inp { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px; font-size: 13px; margin-bottom: 8px; outline: none; font-family: 'DM Sans', sans-serif; color: var(--text); transition: border-color 0.2s; }
.inp:focus { border-color: var(--violet-mid); background: #faf8ff; }
.inp:last-of-type { margin-bottom: 0; }
.btn-primary { background: var(--violet); color: white; border: none; border-radius: 10px; padding: 13px; width: 100%; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'DM Sans', sans-serif; margin-top: 10px; transition: opacity 0.2s, transform 0.15s; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.55; }

/* LIST ITEM */
.section-label { font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 10px; letter-spacing: 0.05em; }
.recent-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.ri-info { flex: 1; min-width: 0; }
.ri-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.ri-actions { display: flex; gap: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: transform 0.15s; }
.icon-btn:active { transform: scale(0.9); }

/* TARIK PANEL */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 5px; text-align: center; cursor: pointer; transition: box-shadow 0.2s, transform 0.15s; }
.stat-card:active { transform: scale(0.97); }
.stat-card.active-filter { box-shadow: 0 0 0 2px var(--violet); }
.stat-num { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }

/* FILTER TABS (in tarik) */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-2); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.filter-chip.active { background: var(--violet); border-color: var(--violet); color: white; }

/* PULL CARD */
.pull-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--red); padding: 12px 13px; margin-bottom: 8px; transition: opacity 0.3s; }
.pull-card.amber { border-left-color: var(--amber); }
.pull-card.green { border-left-color: var(--green); }
.pull-card.done { opacity: 0.38; }
.pull-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.pull-name { font-size: 13px; font-weight: 600; }
.pull-meta { font-size: 11px; color: var(--text-2); margin-top: 3px; }
.pull-status-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-top: 5px; display: inline-block; }
.pull-status-badge.red { background: var(--red-light); color: var(--red); }
.pull-status-badge.amber { background: var(--amber-light); color: var(--amber); }
.pull-status-badge.green { background: var(--green-light); color: var(--green); }
.check-box { min-width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-2); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* SCANNER OVERLAY — Improved */
.scanner-overlay { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
.scanner-overlay.open { display: flex; }
.scanner-header { padding: 54px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
.scanner-title { color: white; font-weight: 700; font-size: 16px; }
.scanner-close { background: rgba(255,255,255,0.15); border: none; color: white; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.scanner-hint { color: rgba(255,255,255,0.5); font-size: 12px; text-align: center; padding: 0 20px 10px; }
#html5-qrcode-container { flex: 1; }

/* Crosshair overlay for scanner */
.scanner-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; pointer-events: none; z-index: 210; }
.scanner-frame::before, .scanner-frame::after { content: ''; position: absolute; width: 36px; height: 36px; border-color: #fff; border-style: solid; }
.scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scanner-frame::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scanner-frame-tr, .scanner-frame-bl { position: absolute; width: 36px; height: 36px; border-color: #fff; border-style: solid; }
.scanner-frame-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scanner-frame-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

/* Scanner scan line animation */
@keyframes scanLine { 0% { top: 10%; } 100% { top: 90%; } }
.scan-line { position: absolute; left: 5%; right: 5%; height: 2px; background: linear-gradient(90deg, transparent, #6d28d9, #a78bfa, #6d28d9, transparent); border-radius: 2px; animation: scanLine 1.8s ease-in-out infinite alternate; z-index: 211; }

/* MODAL EDIT */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-card { background: white; width: 100%; max-width: 430px; border-radius: 20px 20px 0 0; padding: 20px 20px 40px; }
.modal-title { font-weight: 700; font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 12px; }
.btn-cancel { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text); }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1c1033; color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 1000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #065f46; }
.toast.error { background: #7f1d1d; }

/* SCAN SUCCESS FLASH */
@keyframes flashGreen { 0% { background: rgba(5,150,105,0.3); } 100% { background: transparent; } }
.scan-success-flash { animation: flashGreen 0.6s ease-out; }

/* LOKASI suggestion */
.lokasi-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.lokasi-chip { background: var(--violet-light); color: var(--violet); border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SCANNER OVERLAY -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-header">
    <span class="scanner-title">📷 Scan Barcode</span>
    <button class="scanner-close" onclick="closeScanner()">Tutup</button>
  </div>
  <p class="scanner-hint">Arahkan kamera ke barcode produk</p>
  <div style="position:relative; flex:1;">
    <div id="html5-qrcode-container" style="width:100%;height:100%;"></div>
    <div class="scanner-frame">
      <div class="scan-line"></div>
      <div class="scanner-frame-tr"></div>
      <div class="scanner-frame-bl"></div>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal-card">
    <div class="modal-title">Edit Data Barang</div>
    <input type="hidden" id="editRowIndex">
    <input class="inp" id="editBarcode" placeholder="Barcode">
    <input class="inp" id="editDesc" placeholder="Nama Barang">
    <input class="inp" id="editExp" type="date">
    <input class="inp" id="editLokasi" placeholder="Lokasi (Rak/Area)">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Batal</button>
      <button class="btn-primary" style="margin:0;flex:1.5" onclick="saveEdit()" id="btnSaveEdit">Simpan</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Expired Control D&D</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="sync-btn" onclick="loadAll()" id="syncBtn">↻ Sync</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabInput" onclick="switchTab('input')">Input</button>
    <button class="tab-btn" id="tabTarik" onclick="switchTab('tarik')">Tarik</button>
  </div>
</div>

<div class="main">
  <!-- TAB INPUT -->
  <div class="panel active" id="panelInput">
    <div class="scan-area" onclick="openScanner()" id="scanArea">
      <div class="scan-area-icon">📷</div>
      <div class="scan-area-text">Klik untuk Scan Barcode</div>
      <div class="scan-area-sub">Kamera belakang • Auto-detect • Langsung isi form</div>
    </div>

    <div class="form-card" id="formCard">
      <input class="inp" id="fBarcode" placeholder="Barcode (atau scan)" oninput="autoFill(this.value)">
      <input class="inp" id="fDesc" placeholder="Nama Barang">
      <input class="inp" id="fExp" type="date">
      <div class="lokasi-chips" id="lokasiChips"></div>
      <input class="inp" id="fLokasi" placeholder="Lokasi (Rak/Area)" oninput="updateLokasiChips()">
      <button class="btn-primary" onclick="submitInput()" id="submitBtn">💾 Simpan Ke Spreadsheet</button>
    </div>

    <div class="section-label">INPUT HARI INI</div>
    <div id="recentList"></div>
  </div>

  <!-- TAB TARIK -->
  <div class="panel" id="panelTarik">
    <div class="stat-row">
      <div class="stat-card" id="cardHarus" onclick="setFilter('red')" title="Filter: Harus Tarik">
        <div class="stat-num" style="color:var(--red)" id="sHarus">0</div>
        <div class="stat-lbl">Harus Tarik</div>
      </div>
      <div class="stat-card" id="cardMendekati" onclick="setFilter('amber')" title="Filter: Mendekati">
        <div class="stat-num" style="color:var(--amber)" id="sMendekati">0</div>
        <div class="stat-lbl">Mendekati</div>
      </div>
      <div class="stat-card" id="cardAman" onclick="setFilter('green')" title="Filter: Aman">
        <div class="stat-num" style="color:var(--green)" id="sAman">0</div>
        <div class="stat-lbl">Aman</div>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-chip active" id="chip-today" onclick="setFilter('today')">🔥 Hari Ini</button>
      <button class="filter-chip" id="chip-red" onclick="setFilter('red')">🔴 Harus Tarik</button>
      <button class="filter-chip" id="chip-amber" onclick="setFilter('amber')">🟡 Mendekati</button>
      <button class="filter-chip" id="chip-green" onclick="setFilter('green')">🟢 Aman</button>
      <button class="filter-chip" id="chip-all" onclick="setFilter('all')">Semua</button>
    </div>

    <div id="pullList"></div>
  </div>
</div>

<script>
// =============================================
// KONFIGURASI
// =============================================
const PROXY_URL = "/api/proxy";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAUZU8sXxjAfd8_pWPR0fybYWp2yxIBgvIR57ml25i5bDDDDHvk2ENIfsAw0lgrWMv/exec";
const API_TOKEN = "RAHASIA_123";

const CACHE_TTL_MS = 6 * 60 * 60 * 1000;

let dbItems = [];
let inItems = [];
let checkedRows = new Set();
let activeFilter = 'today';
let html5QrScanner = null;
let lokasiFrecuentes = [];

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

// =============================================
// parseToISO — PERBAIKAN TOTAL: Lebih Agresif Membaca Tanggal
// =============================================
function parseToISO(raw) {
  if (!raw) return null;
  
  // 1. Jika sudah objek Date
  if (raw instanceof Date) return raw.toISOString().split('T')[0];

  let s = String(raw).trim();
  if (!s || s === "null" || s === "undefined") return null;

  // 2. Cek format ISO YYYY-MM-DD
  const isoMatch = s.match(/^(\d{4}-\d{2}-\d{2})/);
  if (isoMatch) return isoMatch[1];

  // 3. Normalisasi Bulan Indonesia ke Inggris agar terbaca browser (Mei -> May, dst)
  let cleanS = s.toLowerCase()
    .replace(/mei/g, 'may').replace(/agu/g, 'aug').replace(/okt/g, 'oct').replace(/des/g, 'dec');
  
  // 4. Gunakan browser parser (sangat ampuh untuk "2 Jun 2026")
  const d = new Date(cleanS);
  if (!isNaN(d.getTime())) {
    const year = d.getFullYear();
    // Pastikan tahun masuk akal
    if (year > 2000) {
       const month = String(d.getMonth() + 1).padStart(2, '0');
       const day = String(d.getDate()).padStart(2, '0');
       return `${year}-${month}-${day}`;
    }
  }

  // 5. Regex Manual untuk DD/MM/YYYY (Jika browser parser gagal)
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;

  return null;
}

function daysDiff(rawA, rawB) {
  const isoA = parseToISO(rawA);
  const isoB = parseToISO(rawB);
  if (!isoA || !isoB) return 0;
  const [y1,m1,d1] = isoA.split('-').map(Number);
  const [y2,m2,d2] = isoB.split('-').map(Number);
  return Math.round((new Date(y1,m1-1,d1) - new Date(y2,m2-1,d2)) / 86400000);
}

function loadCache() {
  try {
    const dbRaw = localStorage.getItem('cache_db');
    const inRaw = localStorage.getItem('cache_in');
    const chkRaw = localStorage.getItem('cache_checked');
    dbItems = dbRaw ? JSON.parse(dbRaw) : [];
    inItems = inRaw ? JSON.parse(inRaw) : [];
    checkedRows = new Set(chkRaw ? JSON.parse(chkRaw) : []);
  } catch(e) {
    dbItems = []; inItems = []; checkedRows = new Set();
  }
}

function saveCache(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
  localStorage.setItem(key + '_ts', Date.now().toString());
}

async function callApi(params, body = null) {
  try {
    const url = PROXY_URL + "?" + new URLSearchParams(params);
    const res = await fetch(url, { method: body ? 'POST' : 'GET', body: body ? JSON.stringify(body) : null });
    if (res.ok) return await res.json();
  } catch(e) {}

  params.token = API_TOKEN;
  const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(params);
  const res = await fetch(url, { method: body ? 'POST' : 'GET', body: body ? JSON.stringify({ ...body, token: API_TOKEN }) : null });
  return await res.json();
}

async function loadAll() {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.innerText = "Sync...";
  syncBtn.disabled = true;
  try {
    const [dbRes, inRes] = await Promise.all([
      callApi({ action: "getDatabase" }),
      callApi({ action: "getInputs" })
    ]);
    dbItems = dbRes.data;
    inItems = inRes.data;
    saveCache('cache_db', dbItems);
    saveCache('cache_in', inItems);
    renderRecent();
    renderPullList();
    buildLokasiHistory();
    showToast("Data diperbarui ✓", "success");
  } catch(e) {
    showToast("Gagal sync: " + e.message, "error");
  }
  syncBtn.innerText = "↻ Sync";
  syncBtn.disabled = false;
}

async function submitInput() {
  const b = document.getElementById('fBarcode').value.trim();
  const d = document.getElementById('fDesc').value.trim();
  const e = document.getElementById('fExp').value;
  const l = document.getElementById('fLokasi').value.trim();
  if (!b || !e) return showToast("Barcode & Tanggal wajib diisi!", "error");

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerText = "Menyimpan...";
  try {
    const res = await callApi({ action: "addInput" }, { barcode:b, description:d, expiredDate:e, lokasi:l });
    const newItem = { rowIndex: res.rowIndex, barcode:b, description:d, expiredDate:e, lokasi:l, timestamp: getTodayStr() };
    inItems.push(newItem);
    saveCache('cache_in', inItems);
    renderRecent(); renderPullList(); buildLokasiHistory();
    document.getElementById('fBarcode').value = "";
    document.getElementById('fDesc').value = "";
    document.getElementById('fExp').value = getTodayStr();
    document.getElementById('fLokasi').value = "";
    showToast("Berhasil disimpan ✓", "success");
  } catch(x) {
    showToast("Gagal simpan: " + x.message, "error");
  }
  btn.disabled = false; btn.innerText = "💾 Simpan Ke Spreadsheet";
}

function openEdit(idx) {
  const item = inItems.find(i => i.rowIndex == idx);
  if (!item) return;
  document.getElementById('editRowIndex').value = idx;
  document.getElementById('editBarcode').value = item.barcode;
  document.getElementById('editDesc').value = item.description;
  document.getElementById('editExp').value = parseToISO(item.expiredDate);
  document.getElementById('editLokasi').value = item.lokasi || '';
  document.getElementById('modalEdit').classList.add('open');
}

function closeEditModal() { document.getElementById('modalEdit').classList.remove('open'); }

async function saveEdit() {
  const idx = document.getElementById('editRowIndex').value;
  const b = document.getElementById('editBarcode').value.trim();
  const d = document.getElementById('editDesc').value.trim();
  const e = document.getElementById('editExp').value;
  const l = document.getElementById('editLokasi').value.trim();
  const btn = document.getElementById('btnSaveEdit');
  btn.disabled = true;
  try {
    await callApi({ action: "updateInput" }, { rowIndex:idx, barcode:b, description:d, expiredDate:e, lokasi:l });
    const i = inItems.findIndex(x => x.rowIndex == idx);
    inItems[i] = { ...inItems[i], barcode:b, description:d, expiredDate:e, lokasi:l };
    saveCache('cache_in', inItems);
    renderRecent(); renderPullList(); closeEditModal();
    showToast("Berhasil diupdate ✓", "success");
  } catch(x) { showToast("Gagal update", "error"); }
  btn.disabled = false;
}

async function delItem(idx) {
  if (!confirm("Hapus data ini?")) return;
  try {
    await callApi({ action: "deleteInput" }, { rowIndex: idx });
    inItems = inItems.filter(x => x.rowIndex != idx);
    saveCache('cache_in', inItems);
    renderRecent(); renderPullList();
    showToast("Data dihapus", "success");
  } catch(x) { showToast("Gagal hapus", "error"); }
}

function formatDateIndo(raw) {
  const iso = parseToISO(raw);
  if (!iso) return '-';
  const [y,m,d] = iso.split('-').map(Number);
  const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  return `${d} ${months[m-1]} ${y}`;
}

function renderRecent() {
  const container = document.getElementById('recentList');
  const today = getTodayStr();
  const filtered = inItems.filter(i => i.timestamp && i.timestamp.startsWith(today)).reverse();
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">Belum ada input hari ini</div>`;
    return;
  }
  container.innerHTML = filtered.map(i => `
    <div class="recent-item">
      <div class="ri-info">
        <div class="ri-name">${escHtml(i.description || i.barcode)}</div>
        <div class="ri-meta">${escHtml(i.barcode)} · Exp: ${formatDateIndo(i.expiredDate)}</div>
      </div>
      <div class="ri-actions">
        <button class="icon-btn" onclick="openEdit(${i.rowIndex})">✏️</button>
        <button class="icon-btn" onclick="delItem(${i.rowIndex})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(f => f.classList.toggle('active', f.id === 'chip-'+filter));
  renderPullList();
}

function renderPullList() {
  const container = document.getElementById('pullList');
  const today = getTodayStr();
  let h = 0, m = 0, a = 0;

  const list = inItems.map(i => {
    const db = dbItems.find(x => x.barcode === i.barcode);
    const hMin = db ? (db.hMinus || 0) : 0;
    const isoExp = parseToISO(i.expiredDate);
    
    if (!isoExp) {
      a++;
      return { ...i, status: 'green', daysUntilPull: 9999, daysUntilExp: 9999 };
    }

    const daysUntilExp = daysDiff(isoExp, today);
    const daysUntilPull = daysUntilExp - (hMin - 1);

    let status = 'green';
    if (daysUntilPull <= 0) { status = 'red'; h++; }
    else if (daysUntilPull <= 3) { status = 'amber'; m++; }
    else a++;

    return { ...i, isoExp, status, daysUntilPull, daysUntilExp, hMin };
  }).sort((a, b) => a.daysUntilPull - b.daysUntilPull);

  document.getElementById('sHarus').innerText = h;
  document.getElementById('sMendekati').innerText = m;
  document.getElementById('sAman').innerText = a;

  let filtered = list;
  if (activeFilter === 'today') filtered = list.filter(i => i.status === 'red' || i.status === 'amber');
  else if (activeFilter !== 'all') filtered = list.filter(i => i.status === activeFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state">Data kosong</div>`;
    return;
  }

  container.innerHTML = filtered.map(i => {
    const checked = checkedRows.has(i.rowIndex);
    const expText = i.daysUntilExp === 9999 ? 'Tgl tidak diset' : `Exp: ${formatDateIndo(i.isoExp)} (${i.daysUntilExp} hr)`;
    return `
      <div class="pull-card ${i.status} ${checked ? 'done' : ''}">
        <div class="pull-card-top">
          <div style="flex:1">
            <div class="pull-name">${escHtml(i.description || i.barcode)}</div>
            <div class="pull-meta">${escHtml(i.barcode)}${i.lokasi ? ' · '+escHtml(i.lokasi) : ''}</div>
            <div class="pull-meta">${expText}</div>
          </div>
          <div class="check-box ${checked ? 'checked' : ''}" onclick="toggleCheck(${i.rowIndex})">${checked ? '✔️' : ''}</div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleCheck(idx) {
  if (checkedRows.has(idx)) checkedRows.delete(idx); else checkedRows.add(idx);
  saveCache('cache_checked', [...checkedRows]);
  renderPullList();
}

function buildLokasiHistory() {
  const freq = {};
  inItems.forEach(i => { if (i.lokasi) freq[i.lokasi] = (freq[i.lokasi] || 0) + 1; });
  lokasiFrecuentes = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,5).map(e => e[0]);
  renderLokasiChips('');
}

function renderLokasiChips(v) {
  const c = document.getElementById('lokasiChips');
  const s = lokasiFrecuentes.filter(l => !v || l.toLowerCase().includes(v.toLowerCase()));
  c.innerHTML = s.map(l => `<button class="lokasi-chip" onclick="pickLokasi('${l.replace(/'/g,"\\'")}')">${l}</button>`).join('');
}

function updateLokasiChips() { renderLokasiChips(document.getElementById('fLokasi').value); }
function pickLokasi(v) { document.getElementById('fLokasi').value = v; renderLokasiChips(''); }

function openScanner() {
  document.getElementById('scannerOverlay').classList.add('open');
  html5QrScanner = new Html5Qrcode("html5-qrcode-container");
  html5QrScanner.start({ facingMode: "environment" }, { fps: 30, qrbox: { width: 250, height: 150 } }, (t) => onScanSuccess(t));
}

function onScanSuccess(t) {
  closeScanner();
  document.getElementById('fBarcode').value = t;
  autoFill(t);
  showToast("Barcode terbaca", "success");
}

function closeScanner() {
  document.getElementById('scannerOverlay').classList.remove('open');
  if (html5QrScanner) { html5QrScanner.stop(); html5QrScanner = null; }
}

function autoFill(val) {
  const found = dbItems.find(x => x.barcode === val);
  if (found) document.getElementById('fDesc').value = found.description || '';
}

function switchTab(t) {
  document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
}

function showToast(m, type) {
  const t = document.getElementById('toast');
  t.innerText = m; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function escHtml(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.onload = () => {
  document.getElementById('headerDate').innerText = formatDateIndo(getTodayStr());
  document.getElementById('fExp').value = getTodayStr();
  loadCache(); renderRecent(); renderPullList(); buildLokasiHistory();
  loadAll();
};
</script>
</body>
</html>
