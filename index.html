<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expired Control D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --violet: #6d28d9; --violet-light: #ede9fe; --violet-mid: #8b5cf6;
  --red: #dc2626; --red-light: #fee2e2; --amber: #d97706; --amber-light: #fef3c7;
  --green: #059669; --green-light: #d1fae5; --surface: #ffffff;
  --bg: #f5f3ff; --border: #e8e3f7; --text: #1c1033; --text-2: #6b7280;
  --text-3: #a78bfa; --radius: 16px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; min-height: 100vh; }

/* HEADER */
.header { background: var(--violet); padding: 50px 20px 0; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.header-title { color: #fff; font-size: 18px; font-weight: 600; }
.sync-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }

/* TABS */
.tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.15); border-radius: 10px 10px 0 0; padding: 5px 5px 0; }
.tab-btn { flex: 1; background: transparent; border: none; color: rgba(255,255,255,0.6); padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px 8px 0 0; }
.tab-btn.active { background: var(--bg); color: var(--violet); }

/* CONTENT */
.main { padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

.scan-area { background: white; border: 2px dashed var(--border); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; }
.form-card { background: white; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
.inp { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 14px; margin-bottom: 8px; outline: none; }
.btn-primary { background: var(--violet); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }

/* ITEM LIST */
.item-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.ri-info { flex: 1; }
.ri-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.ri-meta { font-size: 11px; color: var(--text-2); }
.ri-actions { display: flex; gap: 8px; }
.icon-btn { width: 34px; height: 34px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* STATS */
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.stat-card { background: white; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
.stat-num { font-size: 20px; font-weight: 700; }

/* PULL CARD */
.pull-card { background: white; border-radius: 12px; border: 1px solid var(--border); border-left: 5px solid var(--red); padding: 12px; margin-bottom: 8px; }
.pull-card.amber { border-left-color: var(--amber); }
.pull-card.green { border-left-color: var(--green); }
.pull-card.done { opacity: 0.4; filter: grayscale(1); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; padding: 20px; z-index: 1000; }
.modal-overlay.open { display: flex; }
.modal-card { background: white; width: 100%; border-radius: 15px; padding: 20px; }

/* SCANNER */
.scanner-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
.scanner-overlay.open { display: flex; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; display: none; z-index: 3000; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- SCANNER -->
<div class="scanner-overlay" id="scannerOverlay">
  <div style="padding: 40px 20px 20px; display: flex; justify-content: space-between; color: white;">
    <span>Scan Barcode</span>
    <button onclick="closeScanner()" style="color:white; background:none; border:none;">Tutup</button>
  </div>
  <div id="html5-qrcode-container"></div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal-card">
    <h3 style="margin-bottom:15px;">Edit Data</h3>
    <input type="hidden" id="editRowIndex">
    <input class="inp" id="editBarcode" placeholder="Barcode">
    <input class="inp" id="editDesc" placeholder="Nama Barang">
    <input class="inp" id="editExp" type="date">
    <input class="inp" id="editLokasi" placeholder="Lokasi">
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="btn-primary" style="background:#ccc" onclick="closeEditModal()">Batal</button>
      <button class="btn-primary" onclick="saveEdit()" id="btnSaveEdit">Simpan</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="header-title">Expired Control D&D</div>
    <button class="sync-btn" onclick="loadAll()" id="syncBtn">Sync</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="btn-input" onclick="switchTab('input')">Input</button>
    <button class="tab-btn" id="btn-tarik" onclick="switchTab('tarik')">Tarik</button>
  </div>
</div>

<div class="main">
  <!-- PANEL INPUT -->
  <div class="panel active" id="panel-input">
    <div class="scan-area" onclick="openScanner()">
      <div style="font-size:30px; margin-bottom:5px;">📷</div>
      <div style="font-weight:600">Klik untuk Scan</div>
    </div>
    <div class="form-card">
      <input class="inp" id="fBarcode" placeholder="Barcode" oninput="autoFill(this.value)">
      <input class="inp" id="fDesc" placeholder="Nama Barang">
      <input class="inp" id="fExp" type="date">
      <input class="inp" id="fLokasi" placeholder="Lokasi">
      <button class="btn-primary" onclick="submitInput()" id="submitBtn">Simpan</button>
    </div>
    <div style="font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:10px;">DATA HARI INI</div>
    <div id="recentList"></div>
  </div>

  <!-- PANEL TARIK -->
  <div class="panel" id="panel-tarik">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" style="color:var(--red)" id="sHarus">0</div><div class="stat-lbl">Harus</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)" id="sMendekati">0</div><div class="stat-lbl">Nanti</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="sAman">0</div><div class="stat-lbl">Aman</div></div>
    </div>
    <div id="pullList"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyAUZU8sXxjAfd8_pWPR0fybYWp2yxIBgvIR57ml25i5bDDDDHvk2ENIfsAw0lgrWMv/exec"; 
const TOKEN = "RAHASIA_123";

let dbItems = JSON.parse(localStorage.getItem('db_cache') || "[]");
let inItems = JSON.parse(localStorage.getItem('in_cache') || "[]");
let checkedRows = new Set(JSON.parse(localStorage.getItem('checked_cache') || "[]"));
let html5QrScanner = null;

function formatDateIndo(val) {
  if (!val) return "-";
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

async function api(p, b = null) {
  p.token = TOKEN;
  const uri = URL + "?" + new URLSearchParams(p);
  const opt = { method: b ? 'POST' : 'GET', body: b ? JSON.stringify({...b, token: TOKEN}) : null };
  const res = await fetch(uri, opt);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadAll() {
  document.getElementById('syncBtn').innerText = "...";
  try {
    const [d, i] = await Promise.all([api({action:"getDatabase"}), api({action:"getInputs"})]);
    dbItems = d.data; inItems = i.data;
    localStorage.setItem('db_cache', JSON.stringify(dbItems));
    localStorage.setItem('in_cache', JSON.stringify(inItems));
    renderAll();
    showToast("Data diperbarui");
  } catch(e) { showToast("Gagal Sync"); }
  document.getElementById('syncBtn').innerText = "Sync";
}

async function submitInput() {
  const b = document.getElementById('fBarcode').value;
  const d = document.getElementById('fDesc').value;
  const e = document.getElementById('fExp').value;
  const l = document.getElementById('fLokasi').value;
  if(!b || !e) return showToast("Barcode & Tgl wajib!");

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerText = "Menyimpan...";
  try {
    const res = await api({action:"addInput"}, {barcode:b, description:d, expiredDate:e, lokasi:l});
    inItems.push({rowIndex:res.rowIndex, barcode:b, description:d, expiredDate:e, lokasi:l, timestamp:new Date().toISOString()});
    localStorage.setItem('in_cache', JSON.stringify(inItems));
    renderAll();
    document.getElementById('fBarcode').value = ""; document.getElementById('fDesc').value = "";
    showToast("Berhasil!");
  } catch(x) { showToast("Gagal!"); }
  btn.disabled = false; btn.innerText = "Simpan";
}

function renderAll() {
  const today = new Date().toISOString().split('T')[0];
  
  // Render Tab Input
  const recent = inItems.filter(i => i.timestamp && i.timestamp.startsWith(today)).reverse();
  document.getElementById('recentList').innerHTML = recent.map(i => `
    <div class="item-card">
      <div class="ri-info">
        <div class="ri-name">${i.description || i.barcode}</div>
        <div class="ri-meta">Exp: ${formatDateIndo(i.expiredDate)} · ${i.lokasi || '-'}</div>
      </div>
      <div class="ri-actions">
        <button class="icon-btn" style="background:#ede9fe" onclick="openEdit(${i.rowIndex})">✏️</button>
        <button class="icon-btn" style="background:#fee2e2" onclick="delItem(${i.rowIndex})">🗑️</button>
      </div>
    </div>
  `).join('') || '<div style="text-align:center;color:#999;font-size:12px;">Belum ada input</div>';

  // Render Tab Tarik
  let h=0, m=0, a=0;
  const tarikList = inItems.map(i => {
    const db = dbItems.find(x => x.barcode === i.barcode);
    const hMin = db ? db.hMinus : 0;
    const diff = Math.round((new Date(i.expiredDate) - new Date(today)) / 86400000);
    const pullDays = diff - hMin;
    let status = 'green';
    if(pullDays <= 0) { status = 'red'; h++; } else if(pullDays <= 3) { status = 'amber'; m++; } else a++;
    return { ...i, status, pullDays };
  }).sort((a,b) => a.pullDays - b.pullDays);

  document.getElementById('sHarus').innerText = h;
  document.getElementById('sMendekati').innerText = m;
  document.getElementById('sAman').innerText = a;

  document.getElementById('pullList').innerHTML = tarikList.map(i => `
    <div class="pull-card ${i.status} ${checkedRows.has(i.rowIndex)?'done':''}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start">
        <div>
          <div class="ri-name">${i.description || i.barcode}</div>
          <div class="ri-meta">Expired: ${formatDateIndo(i.expiredDate)}</div>
          <div style="font-size:10px; font-weight:700; margin-top:5px; color:#666">${i.status === 'red' ? 'HARUS TARIK' : i.status === 'amber' ? 'MENDEKATI' : 'AMAN'}</div>
        </div>
        <div class="check-box ${checkedRows.has(i.rowIndex)?'checked':''}" onclick="toggleCheck(${i.rowIndex})">
          ${checkedRows.has(i.rowIndex)?'✔️':''}
        </div>
      </div>
    </div>
  `).join('');
}

function openEdit(idx) {
  const item = inItems.find(i => i.rowIndex == idx);
  if(!item) return;
  document.getElementById('editRowIndex').value = idx;
  document.getElementById('editBarcode').value = item.barcode;
  document.getElementById('editDesc').value = item.description;
  document.getElementById('editExp').value = item.expiredDate;
  document.getElementById('editLokasi').value = item.lokasi;
  document.getElementById('modalEdit').classList.add('open');
}

function closeEditModal() { document.getElementById('modalEdit').classList.remove('open'); }

async function saveEdit() {
  const idx = document.getElementById('editRowIndex').value;
  const b = document.getElementById('editBarcode').value;
  const d = document.getElementById('editDesc').value;
  const e = document.getElementById('editExp').value;
  const l = document.getElementById('editLokasi').value;
  try {
    await api({action:"updateInput"}, {rowIndex:idx, barcode:b, description:d, expiredDate:e, lokasi:l});
    const i = inItems.findIndex(x => x.rowIndex == idx);
    inItems[i] = {...inItems[i], barcode:b, description:d, expiredDate:e, lokasi:l};
    localStorage.setItem('in_cache', JSON.stringify(inItems));
    renderAll(); closeEditModal(); showToast("Berhasil!");
  } catch(x) { showToast("Gagal!"); }
}

async function delItem(idx) {
  if(!confirm("Hapus data?")) return;
  try {
    await api({action:"deleteInput"}, {rowIndex:idx});
    inItems = inItems.filter(x => x.rowIndex != idx);
    localStorage.setItem('in_cache', JSON.stringify(inItems));
    renderAll(); showToast("Dihapus");
  } catch(x) { showToast("Gagal!"); }
}

function toggleCheck(idx) {
  if(checkedRows.has(idx)) checkedRows.delete(idx); else checkedRows.add(idx);
  localStorage.setItem('checked_cache', JSON.stringify([...checkedRows]));
  renderAll();
}

function switchTab(t) {
  document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('btn-'+t).classList.add('active');
}

function openScanner() {
  document.getElementById('scannerOverlay').classList.add('open');
  html5QrScanner = new Html5Qrcode("html5-qrcode-container");
  html5QrScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
    if(navigator.vibrate) navigator.vibrate(50);
    closeScanner();
    document.getElementById('fBarcode').value = text;
    autoFill(text);
  });
}
function closeScanner() {
  document.getElementById('scannerOverlay').classList.remove('open');
  if(html5QrScanner) html5QrScanner.stop();
}
function autoFill(val) {
  const item = dbItems.find(x => x.barcode === val);
  if(item) document.getElementById('fDesc').value = item.description;
}
function showToast(m) {
  const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderAll(); // Jalankan render saat pertama buka
</script>
</body>
</html>
